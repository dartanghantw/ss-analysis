# CI: lint → security → tests; on version tags or manual dispatch, publish a wheel to GitHub Releases.
#
# Cut a release (tag already exists locally):
#   git tag v0.1.0 && git push origin v0.1.0
#
# Or use "Run workflow" with version "0.1.0" (creates tag v0.1.0 + release on the default branch SHA).

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0 or v0.2.0); creates tag + GitHub Release with wheel"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cosmetic:
    name: Lint (make ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install deps (locked)
        run: uv sync --group dev --frozen

      - name: Ruff
        run: make ruff

  security-dependencies:
    name: Security (make pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install deps (locked)
        run: uv sync --group dev --frozen

      - name: Dependency vulnerability audit
        run: make pip-audit

  security-secret-scanning:
    name: Security (Betterleaks secret scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install deps (locked)
        run: |
          git clone https://github.com/betterleaks/betterleaks
          cd betterleaks
          make betterleaks

      - name: Betterleaks secret scanning
        run: betterleaks dir /path/to/file/or/dir -v

  test:
    name: Tests (make pytest)
    needs: [cosmetic, security-dependencies, security-secret-scanning]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install deps (locked)
        run: uv sync --group dev --frozen

      - name: Pytest
        run: make pytest

  release:
    name: Release (wheel + GitHub Release)
    runs-on: ubuntu-latest
    needs: [cosmetic, test, security-dependencies, security-secret-scanning]
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' &&
        (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install deps and build wheel
        run: |
          uv sync --group dev --frozen
          uv build

      - name: Publish GitHub Release with wheel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            RAW="${{ github.event.inputs.version }}"
            TAG="v${RAW#v}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.whl --clobber
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            gh release create "$TAG" dist/*.whl \
              --title "$TAG" \
              --generate-notes \
              --target "${GITHUB_SHA}"
          else
            gh release create "$TAG" dist/*.whl \
              --title "$TAG" \
              --generate-notes
          fi
